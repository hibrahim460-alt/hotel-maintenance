<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WH Hotel - Operational Service Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-stone-100 text-stone-900 font-sans min-h-screen">

  <div id="screen-role-select" class="max-w-4xl mx-auto px-6 py-20 text-center">
    <h1 class="text-4xl font-extrabold mb-4 text-stone-800">WH Hotel Workspace</h1>
    <p class="text-stone-600 mb-12">Select your operational interface to interact with real-time pipelines.</p>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <button onclick="switchRole('reception')" class="p-8 bg-white rounded-2xl shadow-sm border border-stone-200 transition text-center group hover:shadow-md">
        <div class="text-4xl mb-3 group-hover:scale-110 transition-transform">🛎️</div>
        <div class="font-bold text-xl text-stone-800">Reception Desk</div>
        <p class="text-xs text-stone-500 mt-2">Log requests & access history logs</p>
      </button>

      <button onclick="switchRole('maintenance')" class="p-8 bg-white rounded-2xl shadow-sm border border-stone-200 transition text-center group hover:shadow-md">
        <div class="text-4xl mb-3 group-hover:scale-110 transition-transform">🛠️</div>
        <div class="font-bold text-xl text-stone-800">Maintenance Eng.</div>
        <p class="text-xs text-stone-500 mt-2">View and resolve technical repairs</p>
      </button>

      <button onclick="switchRole('housekeeping')" class="p-8 bg-white rounded-2xl shadow-sm border border-stone-200 transition text-center group hover:shadow-md">
        <div class="text-4xl mb-3 group-hover:scale-110 transition-transform">🧹</div>
        <div class="font-bold text-xl text-stone-800">Housekeeping</div>
        <p class="text-xs text-stone-500 mt-2">Manage room cleaning & amenities</p>
      </button>
    </div>
  </div>

  <div id="app-container" class="hidden max-w-7xl mx-auto px-4 py-6">
    <header class="flex flex-col sm:flex-row justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-6 border border-stone-200 gap-4">
      <div class="flex items-center gap-4">
        <button onclick="location.reload()" class="px-3 py-1.5 bg-stone-200 hover:bg-stone-300 rounded-md text-sm font-semibold transition">← Back</button>
        <h2 id="dashboard-title" class="text-2xl font-bold text-stone-800">Department Dashboard</h2>
      </div>
      <span class="px-3 py-1 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 animate-pulse">● LIVE PIPELINE SYNC</span>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <div id="form-panel" class="hidden lg:col-span-1 bg-white p-6 rounded-xl border border-stone-200 h-fit">
        <h3 class="text-lg font-bold mb-4 text-stone-800">New Request Dispatch</h3>
        
        <form id="request-form" onsubmit="handleFormSubmit(event)" class="space-y-4">
          <div>
            <label class="block text-xs font-bold uppercase text-stone-500 mb-1">Room Number</label>
            <input type="text" id="room_number" required placeholder="e.g., 304" class="w-full p-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none">
          </div>

          <div>
            <label class="block text-xs font-bold uppercase text-stone-500 mb-1">Guest Name</label>
            <input type="text" id="guest_name" required placeholder="e.g., Mr. Smith" class="w-full p-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none">
          </div>

          <div>
            <label class="block text-xs font-bold uppercase text-stone-500 mb-1">Task Category</label>
            <select id="issue_category" required class="w-full p-2.5 border border-stone-300 rounded-lg bg-white focus:ring-2 focus:ring-amber-500 focus:outline-none">
              <optgroup label="🧹 HOUSEKEEPING DEPT">
                <option value="In-house Room Cleaning">In-house Room Cleaning</option>
                <option value="Room Check-out">Room Check-out</option>
                <option value="add-Extra Bed">add-Extra Bed</option>
                <option value="add Baby-Crib ">add Baby-Crib </option>
                <option value="Extra Bath Towel">Extra Bath Towel</option>
                <option value="Extra Hand Towel">Extra Hand Towel</option>
                <option value="add Shampoo">add Shampoo</option>
                <option value="add Shower Gel">add Shower Gel</option>
              </optgroup>
              <optgroup label="🛠️ MAINTENANCE ENGINEERING DEPT">
                <option value="General Repair">General Maintenance Repair</option>
                <option value="Plumbing">Plumbing Issue</option>
                <option value="Electrical">Electrical / Appliance Issue</option>
                <option value="HVAC">AC / Heating Malfunction</option>
              </optgroup>
            </select>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase text-stone-500 mb-1">Notes / Remarks</label>
            <textarea id="notes" rows="2" placeholder="Details..." class="w-full p-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none"></textarea>
          </div>

          <button type="submit" id="submit-btn" class="w-full py-3 bg-stone-800 text-white font-bold rounded-lg hover:bg-stone-900 transition">Dispatch Request</button>
        </form>

        <div class="mt-8 pt-6 border-t border-stone-200">
          <h4 class="text-sm font-bold uppercase text-stone-500 mb-3">Historical Shift Logs</h4>
          <div class="flex gap-2 mb-4">
            <input type="date" id="report-date" class="w-full p-2 border border-stone-300 rounded-lg text-sm bg-stone-50 focus:outline-none focus:ring-2 focus:ring-amber-500">
            <button onclick="fetchHistoricalReport()" class="px-4 py-2 bg-stone-700 hover:bg-stone-800 text-white font-semibold rounded-lg text-sm transition">Pull</button>
          </div>
          <div id="report-results" class="space-y-2 max-h-64 overflow-y-auto hidden"></div>
        </div>
      </div>

      <div id="pipeline-panel" class="lg:col-span-2 bg-white p-6 rounded-xl border border-stone-200">
        <h3 class="text-lg font-bold mb-4 text-stone-800">Active Queue Pipeline</h3>
        <div id="queue-container" class="space-y-3"></div>
      </div>

    </div>
  </div>

  <script>
    const socket = io();
    let currentRole = '';
    let globalRequestsArray = [];
    
    // 📋 NEW UPDATED EXACT MATCH REGISTRY FOR ROUTING FILTERS
    const housekeepingTasks = [
      "In-house Room Cleaning",
      "Room Check-out",
      "add-Extra Bed",
      "add Baby-Crib ",
      "Extra Bath Towel",
      "Extra Hand Towel",
      "add Shampoo",
      "add Shower Gel"
    ];

    async function loadLiveQueueData() {
      try {
        const res = await fetch('/api/requests/today');
        if (res.ok) { globalRequestsArray = await res.json(); renderRequestQueue(); }
      } catch (err) { console.error("Pipeline sync failed:", err); }
    }

    function switchRole(role) {
      currentRole = role;
      document.getElementById('screen-role-select').classList.add('hidden');
      document.getElementById('app-container').classList.remove('hidden');
      
      const titleEl = document.getElementById('dashboard-title');
      const formPanel = document.getElementById('form-panel');
      const pipelinePanel = document.getElementById('pipeline-panel');

      if (role === 'reception') {
        titleEl.innerText = "🛎️ Front Desk Reception Workspace";
        formPanel.classList.remove('hidden');
        pipelinePanel.className = "lg:col-span-2 bg-white p-6 rounded-xl border border-stone-200";
      } else {
        titleEl.innerText = role === 'maintenance' ? "🛠️ Maintenance Dashboard" : "🧹 Housekeeping Control";
        formPanel.classList.add('hidden');
        pipelinePanel.className = "lg:col-span-3 bg-white p-6 rounded-xl border border-stone-200";
      }
      socket.emit('register_role', role);
      loadLiveQueueData();
    }

    async function handleFormSubmit(event) {
      event.preventDefault();
      const requestData = {
        room_number: document.getElementById('room_number').value.trim(),
        guest_name: document.getElementById('guest_name').value.trim(),
        issue_category: document.getElementById('issue_category').value,
        notes: document.getElementById('notes').value.trim()
      };
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      try {
        const response = await fetch('/api/requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestData)
        });
        if (!response.ok) throw new Error("Validation failure.");
        document.getElementById('request-form').reset();
      } catch (err) { alert(err.message); } finally { submitBtn.disabled = false; }
    }

    async function markTaskComplete(id) {
      try {
        const response = await fetch(`/api/requests/${id}/complete`, { method: 'PATCH' });
        if (!response.ok) throw new Error("Failed state update.");
      } catch (err) { alert(err.message); }
    }

    function renderRequestQueue() {
      const container = document.getElementById('queue-container');
      container.innerHTML = '';
      
      let filteredRequests = globalRequestsArray;
      if (currentRole === 'maintenance') filteredRequests = globalRequestsArray.filter(req => !housekeepingTasks.includes(req.issue_category));
      if (currentRole === 'housekeeping') filteredRequests = globalRequestsArray.filter(req => housekeepingTasks.includes(req.issue_category));

      if (filteredRequests.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-stone-400 font-medium">No active tasks in this department.</div>`;
        return;
      }

      filteredRequests.forEach(req => {
        const isHK = housekeepingTasks.includes(req.issue_category);
        const card = document.createElement('div');
        
        const localTime = new Date(req.timestamp).toLocaleTimeString(navigator.language, {
          hour: '2-digit', minute: '2-digit', hour12: true
        });

        card.className = `p-4 rounded-xl border transition ${req.status === 'completed' ? 'bg-stone-50 border-stone-200 opacity-60' : isHK ? 'bg-purple-50/50 border-purple-200 shadow-sm' : 'bg-amber-50/50 border-amber-200 shadow-sm'}`;
        card.innerHTML = `
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <div class="flex items-center gap-2 flex-wrap">
                <span class="px-2 py-0.5 text-xs font-bold rounded-full ${isHK ? 'bg-purple-100 text-purple-800' : 'bg-amber-100 text-amber-800'}">${isHK ? '🧹 ' : '🛠️ '}${req.issue_category}</span>
                <span class="text-xs font-semibold text-stone-500 bg-stone-200/60 px-1.5 py-0.5 rounded">${localTime}</span>
              </div>
              <h4 class="text-xl font-bold mt-1 text-stone-800">Room ${req.room_number}</h4>
              <p class="text-sm text-stone-600 font-medium">Guest: ${req.guest_name}</p>
              ${req.notes ? `<p class="text-xs text-stone-500 italic mt-1 bg-white p-1.5 rounded border border-stone-200">"${req.notes}"</p>` : ''}
            </div>
            <div class="w-full sm:w-auto text-right">
              ${req.status === 'pending' && currentRole !== 'reception' ? `<button onclick="markTaskComplete('${req._id}')" class="w-full sm:w-auto px-4 py-2 text-sm font-bold text-white rounded-lg shadow-sm ${isHK ? 'bg-purple-600 hover:bg-purple-700' : 'bg-emerald-600 hover:bg-emerald-700'}">Mark Completed ✔</button>` : ''}
              ${req.status === 'completed' ? `<span class="inline-flex items-center gap-1 text-sm font-bold text-emerald-600">✅ Completed</span>` : ''}
            </div>
          </div>`;
        container.appendChild(card);
      });
    }

    async function fetchHistoricalReport() {
      const dateVal = document.getElementById('report-date').value;
      if (!dateVal) { alert("Please select a date."); return; }
      const resultsContainer = document.getElementById('report-results');
      resultsContainer.innerHTML = `<p class="text-xs text-stone-400 text-center py-4 animate-pulse">Querying database registry...</p>`;
      resultsContainer.classList.remove('hidden');
      try {
        const response = await fetch(`/api/reports?date=${dateVal}`);
        if (!response.ok) throw new Error("Could not pull records.");
        const data = await response.json();
        resultsContainer.innerHTML = '';
        
        const summaryBadge = document.createElement('div');
        summaryBadge.className = "p-2 bg-stone-100 rounded-lg border border-stone-200 text-xs font-semibold text-stone-700 mb-3 flex justify-between";
        summaryBadge.innerHTML = `<span>Total: ${data.metrics.total}</span><span class="text-emerald-700">✔ Done: ${data.metrics.fixed}</span><span class="text-amber-700">⌛ Pending: ${data.metrics.pending}</span>`;
        resultsContainer.appendChild(summaryBadge);

        if (data.requests.length === 0) {
          resultsContainer.innerHTML += `<p class="text-xs text-stone-400 text-center py-2">No logs found for this date.</p>`;
          return;
        }
        data.requests.forEach(req => {
          const isHK = housekeepingTasks.includes(req.issue_category);
          const item = document.createElement('div');
          item.className = "p-2.5 rounded-lg border text-xs bg-white border-stone-200";
          item.innerHTML = `
            <div class="flex justify-between items-start mb-1"><span class="font-bold text-stone-800">Room ${req.room_number}</span><span class="px-1.5 py-0.5 rounded-xs font-bold ${req.status === 'completed' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'}">${req.status === 'completed' ? '✔ Done' : '⌛ Pending'}</span></div>
            <p class="text-stone-600 font-medium"><span>${isHK ? '🧹' : '🛠️'}</span> ${req.issue_category} — ${req.guest_name}</p>
            ${req.notes ? `<p class="text-stone-400 italic mt-0.5">"${req.notes}"</p>` : ''}`;
          resultsContainer.appendChild(item);
        });
      } catch (err) { resultsContainer.innerHTML = `<p class="text-xs text-rose-600 text-center py-2">Error: ${err.message}</p>`; }
    }

    socket.on('new_request', (newReq) => { globalRequestsArray.unshift(newReq); renderRequestQueue(); });
    socket.on('request_completed', (updatedReq) => {
      const idx = globalRequestsArray.findIndex(r => r._id === updatedReq._id);
      if (idx !== -1) { globalRequestsArray[idx] = updatedReq; renderRequestQueue(); }
    });
  </script>
</body>
</html>

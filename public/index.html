<!DOCTYPE html>
<html lang="en" class="h-full bg-stone-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WH Modular ERP Platform Engine</title>
  <!-- Link configuration registers for application installation -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0c0a09">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="h-full text-stone-800 antialiased font-sans">

  <div id="auth-gate" class="flex min-h-full items-center justify-center px-4 py-12 sm:px-6 lg:px-8 flex-col gap-4">
    <div class="w-full max-w-sm space-y-6 bg-white p-8 rounded-2xl border border-stone-200 shadow-xl">
      <div>
        <h2 class="text-center text-2xl font-black tracking-tight text-stone-900">WH Operations Console</h2>
        <p class="mt-1.5 text-center text-xs text-stone-400">Enter centralized workspace security tokens.</p>
      </div>
      <form id="login-form" class="space-y-4">
        <input type="text" id="login-user" required placeholder="User System Handle ID" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl text-xs font-mono focus:outline-none focus:ring-1 focus:ring-stone-900">
        <input type="password" id="login-pass" required placeholder="Security Password Key" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-xl text-xs font-mono focus:outline-none focus:ring-1 focus:ring-stone-900">
        <button type="submit" class="w-full py-2.5 bg-stone-900 hover:bg-stone-800 text-white font-bold text-xs uppercase tracking-wide rounded-xl shadow-md transition-all active:scale-[0.99]">Establish Session</button>
      </form>
    </div>

    <!-- NATIVE SYSTEM INSTALL BUTTON HUB -->
    <div id="install-wrapper" class="hidden w-full max-w-sm">
      <button id="pwa-install-btn" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xs uppercase tracking-widest rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 border border-indigo-500 active:scale-[0.99]">
        <span>📥</span> Install App to Desktop
      </button>
    </div>
  </div>

  <div id="workspace-shell" class="hidden min-h-full flex flex-col">
    <header class="bg-white border-b border-stone-200 px-4 py-3 sm:px-6 lg:px-8 flex justify-between items-center shrink-0 shadow-xs">
      <div class="flex items-center gap-4">
        <h1 class="text-xs font-black uppercase tracking-widest text-stone-900 bg-stone-100 border px-2.5 py-1 rounded-md">WH ERP // Core OS</h1>
        <span id="user-badge" class="text-xs font-mono font-bold text-stone-500">Connecting access...</span>
      </div>
      <button id="logout-btn" class="px-3 py-1 bg-stone-50 hover:bg-stone-100 border border-stone-200 rounded-lg text-[11px] font-black uppercase tracking-wider text-stone-600 transition">Terminate Link</button>
    </header>

    <main class="grow max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8">
      <div id="standard-layout-grid" class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
        <section id="module-input-target" class="lg:col-span-1"></section>
        <section id="module-display-target" class="lg:col-span-2"></section>
      </div>
    </main>
  </div>

  <div id="global-toast" class="fixed bottom-5 right-5 z-50 transform translate-y-20 opacity-0 transition-all duration-300"></div>

  <script type="module" src="/app.js"></script>
</body>
</html>
